<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mobile Sponsored Result Fixture</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --surface: #ffffff;
        --soft: #f7f7f4;
        --accent: #0f9f6e;
        --ad: #f3b629;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 915px;
        background: var(--soft);
        color: var(--ink);
      }

      .app {
        width: 412px;
        min-height: 915px;
        margin: 0 auto;
        background: var(--surface);
      }

      header {
        position: sticky;
        top: 0;
        z-index: 2;
        padding: 14px 16px 12px;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
      }

      .location {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
        font-size: 13px;
        font-weight: 700;
      }

      .location span {
        color: var(--muted);
        font-weight: 600;
      }

      .search {
        display: flex;
        align-items: center;
        gap: 9px;
        min-height: 44px;
        padding: 0 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fafafa;
        color: #374151;
        font-size: 15px;
      }

      main {
        padding: 14px 14px 24px;
      }

      .result-count {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .card {
        position: relative;
        min-height: 252px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      .ad-card {
        border-color: #e7c35b;
        box-shadow: 0 0 0 2px rgba(243, 182, 41, 0.14);
      }

      .badge {
        position: absolute;
        top: 8px;
        left: 8px;
        display: inline-flex;
        align-items: center;
        min-height: 20px;
        padding: 0 7px;
        border-radius: 999px;
        background: var(--ad);
        color: #2f2200;
        font-size: 11px;
        font-weight: 800;
      }

      .image {
        display: grid;
        place-items: center;
        height: 112px;
        margin: 8px 0 12px;
        border-radius: 8px;
        background: linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%);
        overflow: hidden;
      }

      .pack {
        width: 74px;
        height: 94px;
        border-radius: 10px 10px 14px 14px;
        background:
          linear-gradient(90deg, rgba(255,255,255,0.24), rgba(255,255,255,0) 42%),
          linear-gradient(180deg, #ffe66d, #f04f37 68%, #bc2a24);
        box-shadow: 0 12px 18px rgba(17, 24, 39, 0.16);
      }

      .bottle {
        width: 48px;
        height: 96px;
        border-radius: 12px 12px 18px 18px;
        background:
          linear-gradient(90deg, rgba(255,255,255,0.4), rgba(255,255,255,0) 50%),
          linear-gradient(180deg, #6ee7b7, #0f9f6e);
      }

      .box {
        width: 82px;
        height: 76px;
        border-radius: 9px;
        background:
          linear-gradient(90deg, rgba(255,255,255,0.34), rgba(255,255,255,0) 45%),
          linear-gradient(135deg, #93c5fd, #2563eb);
      }

      .brand {
        margin: 0 0 4px;
        font-size: 13px;
        font-weight: 800;
      }

      .name {
        min-height: 38px;
        margin: 0 0 8px;
        color: #374151;
        font-size: 12px;
        line-height: 1.35;
      }

      .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .price {
        font-size: 13px;
        font-weight: 800;
      }

      .add {
        min-width: 58px;
        min-height: 30px;
        border: 1px solid var(--accent);
        border-radius: 7px;
        background: #f0fdf7;
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="location">
          Delivery in 8 minutes
          <span>110001</span>
        </div>
        <div class="search">Search chips</div>
      </header>
      <main>
        <p class="result-count">24 results for chips</p>
        <section class="grid" aria-label="Search results">
          <article class="card ad-card" data-testid="product-card-sponsored">
            <span class="badge">Ad</span>
            <div class="image"><div class="pack"></div></div>
            <p class="brand">Lays</p>
            <p class="name">Classic salted potato chips, party pack</p>
            <div class="meta">
              <span class="price">Rs 55</span>
              <button class="add">ADD</button>
            </div>
          </article>

          <article class="card">
            <div class="image"><div class="bottle"></div></div>
            <p class="brand">FreshCo</p>
            <p class="name">Mint lime soda, chilled bottle</p>
            <div class="meta">
              <span class="price">Rs 40</span>
              <button class="add">ADD</button>
            </div>
          </article>

          <article class="card">
            <div class="image"><div class="box"></div></div>
            <p class="brand">Snackly</p>
            <p class="name">Nacho cheese corn crisps</p>
            <div class="meta">
              <span class="price">Rs 65</span>
              <button class="add">ADD</button>
            </div>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
